<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">python-d1-synth MVP architecture</title>
  <desc id="desc">Retro synthwave architecture diagram showing Logic Pro, virtual MIDI, YAML patch config, Python synth engine and audio output.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14002f"/>
      <stop offset="45%" stop-color="#251052"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffdf5d"/>
      <stop offset="45%" stop-color="#ff4fa3"/>
      <stop offset="100%" stop-color="#7b2cff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15213b"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#24f3ff"/>
      <stop offset="50%" stop-color="#ff4fd8"/>
      <stop offset="100%" stop-color="#ffe66d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#24f3ff"/>
    </marker>
  </defs>

  <rect width="1280" height="620" fill="url(#sky)"/>
  <circle cx="640" cy="180" r="115" fill="url(#sun)" opacity="0.95"/>
  <g opacity="0.38">
    <rect x="525" y="132" width="230" height="10" fill="#14002f"/>
    <rect x="504" y="165" width="272" height="10" fill="#14002f"/>
    <rect x="493" y="198" width="294" height="10" fill="#14002f"/>
    <rect x="520" y="231" width="240" height="10" fill="#14002f"/>
  </g>

  <path d="M0 430 L260 280 L430 390 L610 250 L795 380 L1010 275 L1280 430 L1280 620 L0 620 Z" fill="#080b17" opacity="0.92"/>
  <path d="M0 430 L260 280 L430 390 L610 250 L795 380 L1010 275 L1280 430" fill="none" stroke="#ff4fd8" stroke-width="3" opacity="0.75" filter="url(#glow)"/>
  <g stroke="#24f3ff" stroke-width="1" opacity="0.22">
    <path d="M0 620 L640 390 L1280 620"/>
    <path d="M120 620 L640 390 L1160 620"/>
    <path d="M240 620 L640 390 L1040 620"/>
    <path d="M360 620 L640 390 L920 620"/>
    <path d="M480 620 L640 390 L800 620"/>
    <path d="M600 620 L640 390 L680 620"/>
    <path d="M0 568 H1280"/>
    <path d="M0 525 H1280"/>
    <path d="M0 490 H1280"/>
    <path d="M0 462 H1280"/>
  </g>

  <text x="640" y="64" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="0">
    python-d1-synth MVP Architecture
  </text>
  <text x="640" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#c8f8ff">
    Logic Pro MIDI in, YAML-driven Python synth engine out
  </text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(70 175)">
      <rect width="190" height="122" rx="14" fill="url(#card)" stroke="#24f3ff" stroke-width="2" filter="url(#glow)"/>
      <text x="95" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">Logic Pro</text>
      <text x="95" y="66" text-anchor="middle" font-size="14" fill="#c8f8ff">External MIDI track</text>
      <text x="95" y="91" text-anchor="middle" font-size="13" fill="#f7d7ff">Destination: python-d1-synth</text>
    </g>

    <g transform="translate(330 175)">
      <rect width="190" height="122" rx="14" fill="url(#card)" stroke="#ff4fd8" stroke-width="2" filter="url(#glow)"/>
      <text x="95" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">Virtual MIDI</text>
      <text x="95" y="66" text-anchor="middle" font-size="14" fill="#c8f8ff">Mido + RtMidi</text>
      <text x="95" y="91" text-anchor="middle" font-size="13" fill="#f7d7ff">note, velocity, CC, bend</text>
    </g>

    <g transform="translate(590 175)">
      <rect width="190" height="122" rx="14" fill="url(#card)" stroke="#ffe66d" stroke-width="2" filter="url(#glow)"/>
      <text x="95" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">YAML Patch</text>
      <text x="95" y="66" text-anchor="middle" font-size="14" fill="#fff2a8">Performance defaults</text>
      <text x="95" y="91" text-anchor="middle" font-size="13" fill="#f7d7ff">CLI flags can override</text>
    </g>

    <g transform="translate(850 175)">
      <rect width="190" height="122" rx="14" fill="url(#card)" stroke="#24f3ff" stroke-width="2" filter="url(#glow)"/>
      <text x="95" y="32" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">Synth Engine</text>
      <text x="95" y="62" text-anchor="middle" font-size="14" fill="#c8f8ff">oscillator + voices</text>
      <text x="95" y="86" text-anchor="middle" font-size="13" fill="#f7d7ff">ADSR, chords, CC1, bend</text>
    </g>

    <g transform="translate(1090 175)">
      <rect width="150" height="122" rx="14" fill="url(#card)" stroke="#ff4fd8" stroke-width="2" filter="url(#glow)"/>
      <text x="75" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">Audio Out</text>
      <text x="75" y="66" text-anchor="middle" font-size="14" fill="#c8f8ff">sounddevice</text>
      <text x="75" y="91" text-anchor="middle" font-size="13" fill="#f7d7ff">system or chosen device</text>
    </g>
  </g>

  <g fill="none" stroke="#24f3ff" stroke-width="4" marker-end="url(#arrow)" filter="url(#glow)" opacity="0.95">
    <path d="M265 236 H320"/>
    <path d="M525 236 H580"/>
    <path d="M785 236 H840"/>
    <path d="M1045 236 H1080"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#ffffff">
    <rect x="198" y="355" width="884" height="72" rx="18" fill="#0a1020" opacity="0.86" stroke="url(#neon)" stroke-width="2"/>
    <text x="640" y="386" text-anchor="middle" font-weight="700">MVP result: commandline-first, Logic-ready, test-backed, YAML-configured</text>
    <text x="640" y="413" text-anchor="middle" fill="#c8f8ff">No GUI or plugin yet. The architecture is ready for the next sprint.</text>
  </g>
</svg>
